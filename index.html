<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TuZy Kırtasiye ve Oyuncak - Erenler Sakarya'da en kaliteli okul malzemeleri, lisanslı oyuncaklar ve kırtasiye ürünleri. Kapıya teslimat!">
    <meta name="keywords" content="kırtasiye, oyuncak, okul malzemeleri, Erenler, Sakarya, TuZy">
    <title>TuZy Kırtasiye Oyuncak | Erenler Sakarya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: #f5f7fa;
            color: #2d3436;
            line-height: 1.6;
        }

        /* ===== ÜST BAR ===== */
        .top-bar {
            background: #1a1a2e;
            color: white;
            padding: 8px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .top-bar i {
            color: #25d366;
            margin-right: 4px;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            margin-left: 12px;
            transition: 0.3s;
            font-weight: 500;
        }

        .top-bar a:hover {
            color: #25d366;
        }

        .top-bar .sosyal {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .top-bar .sosyal a {
            background: rgba(255,255,255,0.1);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin: 0;
        }

        .top-bar .sosyal a:hover {
            background: #25d366;
            color: white;
        }

        /* ===== NAV ===== */
        nav {
            background: #fff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #e31e24;
            text-decoration: none;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 30px;
            color: #1a73e8;
        }

        .logo span {
            color: #1a73e8;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #e31e24;
            transition: 0.3s;
            border-radius: 2px;
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #e31e24;
        }

        .nav-btn {
            background: #e31e24;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(227,30,36,0.3);
        }

        /* ===== HERO ===== */
        .hero {
            background: linear-gradient(135deg, #e31e24 0%, #c0392b 30%, #1a73e8 100%);
            color: white;
            padding: 100px 5%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 60%);
            animation: don 25s linear infinite;
        }

        @keyframes don {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hero-ic {
            position: relative;
            z-index: 1;
            max-width: 750px;
            margin: 0 auto;
        }

        .hero-etiket {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero h1 {
            font-size: 44px;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
        }

        .hero p {
            font-size: 17px;
            opacity: 0.95;
            margin-bottom: 35px;
            line-height: 1.7;
        }

        .hero-btnlar {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-birincil {
            background: white;
            color: #e31e24;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-birincil:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
        }

        .btn-ikincil {
            background: transparent;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            border: 2px solid white;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-ikincil:hover {
            background: white;
            color: #e31e24;
        }

        /* ===== OZELLIKLER ===== */
        .ozellikler {
            display: flex;
            justify-content: center;
            gap: 40px;
            background: white;
            padding: 30px 5%;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            flex-wrap: wrap;
            text-align: center;
        }

        .ozellik {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 120px;
        }

        .ozellik i {
            font-size: 32px;
            color: #25d366;
            background: #f0fff4;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ozellik strong {
            font-size: 14px;
            color: #2d3436;
        }

        .ozellik span {
            font-size: 11px;
            color: #777;
        }

        /* ===== KATEGORILER ===== */
        .kategoriler {
            padding: 80px 5%;
            text-align: center;
            background: #f5f7fa;
        }

        .bolum-baslik {
            font-size: 34px;
            font-weight: 900;
            color: #2d3436;
            margin-bottom: 10px;
        }

        .bolum-alt {
            color: #777;
            font-size: 15px;
            margin-bottom: 50px;
        }

        .kutu-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1100px;
            margin: 0 auto;
        }

        .kutu {
            flex: 1;
            min-width: 300px;
            max-width: 480px;
            height: 400px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
        }

        .kutu::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.45);
            z-index: 1;
            transition: all 0.5s ease;
        }

        .kutu:hover::before {
            background: rgba(0,0,0,0.2);
        }

        .kutu:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
        }

        .kutu.kirtasiye {
            background: linear-gradient(135deg, #e31e24, #c0392b);
            background-image: url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
        }

        .kutu.oyuncak {
            background: linear-gradient(135deg, #1a73e8, #1557b0);
            background-image: url('https://images.unsplash.com/photo-1558060370-d644479cb6f5?w=800&auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
        }

        .kutu-ic {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .kutu-ikon {
            font-size: 80px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            animation: yuzme 3s ease-in-out infinite;
        }

        @keyframes yuzme {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .kutu-baslik {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
        }

        .kutu-alt {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 400;
            margin-bottom: 25px;
        }

        .kutu-btn {
            background: white;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            display: inline-block;
            transition: 0.3s;
        }

        .kutu.kirtasiye .kutu-btn { color: #e31e24; }
        .kutu.oyuncak .kutu-btn { color: #1a73e8; }

        .kutu:hover .kutu-btn {
            box-shadow: 0 8px 30px rgba(255,255,255,0.5);
            transform: scale(1.08);
        }

        /* ===== ONELER ===== */
        .one-cikanlar {
            padding: 70px 5%;
            text-align: center;
            background: white;
        }

        .urun-mini-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .urun-mini {
            background: #f5f7fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 140px;
            max-width: 180px;
            transition: 0.3s;
        }

        .urun-mini:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .urun-mini i {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .urun-mini h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .urun-mini p {
            font-size: 11px;
            color: #777;
        }

        /* ===== ILETISIM ===== */
        .iletisim {
            background: #f5f7fa;
            padding: 70px 5%;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: space-between;
            align-items: flex-start;
        }

        .iletisim-info {
            flex: 1;
            min-width: 300px;
        }

        .iletisim-info h2 {
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 25px;
        }

        .iletisim-bilgi {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 18px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            transition: 0.3s;
        }

        .iletisim-bilgi:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .iletisim-bilgi i {
            font-size: 22px;
            color: #e31e24;
            background: #fff5f5;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .iletisim-bilgi strong {
            display: block;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .iletisim-bilgi span {
            font-size: 12px;
            color: #777;
        }

        .harita {
            flex: 1;
            min-width: 300px;
            height: 350px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .harita iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* ===== WHATSAPP ===== */
        .wa-buton {
            position: fixed;
            bottom: 30px;
            right: 25px;
            background: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 6px 25px rgba(37,211,102,0.5);
            transition: 0.3s;
            animation: nabiz 2s infinite;
        }

        @keyframes nabiz {
            0% { box-shadow: 0 0 0 0 rgba(37,211,102,0.6); }
            70% { box-shadow: 0 0 0 20px rgba(37,211,102,0); }
            100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
        }

        .wa-buton:hover {
            transform: scale(1.15);
        }

        /* ===== FOOTER ===== */
        footer {
            background: #1a1a2e;
            color: white;
            padding: 40px 5% 20px;
        }

        .footer-ust {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .footer-kolon {
            flex: 1;
            min-width: 200px;
        }

        .footer-kolon h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #e31e24;
        }

        .footer-kolon a {
            display: block;
            color: #bbb;
            text-decoration: none;
            font-size: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .footer-kolon a:hover {
            color: white;
        }

        .footer-alt {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: #888;
        }

        .footer-alt span {
            color: #e31e24;
            font-weight: 700;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero h1 { font-size: 30px; }
            .hero p { font-size: 14px; }
            .kutu { height: 300px; min-width: 260px; }
            .kutu-ikon { font-size: 60px; }
            .kutu-baslik { font-size: 28px; }
            .bolum-baslik { font-size: 26px; }
            .ozellikler { gap: 20px; }
        }

        @media (max-width: 480px) {
            nav { padding: 10px 3%; }
            .logo { font-size: 20px; }
            .logo i { font-size: 24px; }
            .nav-links a { font-size: 11px; }
            .nav-links { gap: 8px; }
            .nav-btn { padding: 8px 14px; font-size: 11px; }
            .hero { padding: 60px 4%; }
            .hero h1 { font-size: 24px; }
            .hero p { font-size: 13px; }
            .btn-birincil, .btn-ikincil { padding: 12px 25px; font-size: 13px; }
            .kutu { height: 250px; min-width: 240px; }
            .kutu-ikon { font-size: 50px; }
            .kutu-baslik { font-size: 24px; }
            .kutu-alt { font-size: 13px; }
            .kutu-btn { padding: 10px 25px; font-size: 13px; }
            .ozellik i { width: 50px; height: 50px; font-size: 24px; }
            .ozellik strong { font-size: 12px; }
            .urun-mini { min-width: 120px; }
            .iletisim-bilgi { padding: 10px; }
            .wa-buton { width: 50px; height: 50px; font-size: 24px; bottom: 20px; right: 15px; }
        }
    </style>
</head>
